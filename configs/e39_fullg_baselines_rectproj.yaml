experiment: e39
exp_name: e39_fullg_baselines_rectproj
seed: 123

grid_size: 256
alpha: 2.0
n_fields: 10
patches_per_field: 10000
k0_frac: 0.15

# Supports
w_big: 193
w_local: 33

# Low-k models
rect_nx: 16
rect_ny: 8
annulus_M: 32
ring_bin_mode: uniform_r   # or: equal_area
ridge_alpha: 1.0

# Full-g pixels baseline (streamed SGD, ridge-like)
pixel_epochs: 8
pixel_batch_size: 256
pixel_alpha: 1.0e-4
pixel_eta0_base: 0.01
pixel_power_t: 0.25

# Placebo: permute y_low during training for rect_learn
rect_placebo_enabled: true
rect_placebo_perms: 50
placebo_seed: 123

# PASS criteria (rect_learn vs P_full_pixels)
pass_fisher_p: 0.05
pass_min_pos_folds: 7
